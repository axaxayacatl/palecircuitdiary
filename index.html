<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #111;
  color: #eee;
  font-family: 'Courier Prime', monospace;
  font-size: 13px;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
}

main {
  flex: 1;
  width: 100%;
  max-width: 400px; 
  margin: 0 auto;
  padding: 1rem;
}

.entry {
  margin-bottom: 2rem;
  text-align: left;
  font-size: 13px;
  position: relative;
  left: calc(var(--offset, 0px));
}

.entry h2 {
  font-size: 14px;
  margin: 0.2rem 0 0.2rem 0;
  font-weight: normal;
}

.entry img {
  display: block;
  max-width: 100%;
  margin: 0.2rem 0 0.5rem 0;
  border-radius: 2px;
  border: 1px solid #555;
}

.entry p {
  margin: 0.2rem 0 0.5rem 0;
  line-height: 1.4;
}

.glyphs {
  font-size: 12px;
  margin: 1rem 0;
  opacity: 0.85;
  line-height: 1.4;
  text-align: center; 
  white-space: nowrap;
  word-wrap: break-word;
}

footer {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  font-size: 10px;
  text-align: left;
  padding: 1rem;
  flex-shrink: 0;
}

footer p {
  text-transform: lowercase;
}

footer a {
  color: #eee;
  text-decoration: underline;
  text-transform: none; 
}
</style>
</head>

<body>

<main>
  <article class="entry" style="--offset: 0px;">
    <h2>Make Her Gently Real</h2>
    <img src="https://raw.githubusercontent.com/axaxayacatl/palecircuitdiary/refs/heads/main/icons/thumbnails/Revelation%20M.jpg">
    <p>digital clay pressed against my fingertips, folded like tiny paper petals.</p>
  </article>

  <div class="glyphs">E = mc² &nbsp; | &nbsp; f(x) = sin(x) &nbsp; | &nbsp; a² + b² = c²</div>

  <article class="entry" style="--offset: 4px;">
    

</main>

<footer>
  <p>written by <a href="https://axayacatl.neocities.org" target="_blank">Axayacatl</a></p>
</footer>

</body>
</html>
